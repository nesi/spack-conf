packages:
  all:
    compiler: [gcc@11.5.0]
  gcc:
    # gcc 11.5.0 is provided by the system, and defined as an external
    externals:
    - spec: gcc@11.5.0 languages:='c,c++'
      prefix: /usr
      extra_attributes:
        compilers:
          c: /usr/bin/gcc
          cxx: /usr/bin/g++
    - spec: gcc@12.3.0 languages:='c,c++,fortran'
      prefix: /opt/nesi/CS400_centos7_bdw/GCCcore/12.3.0
      extra_attributes:
        compilers:
          c: /opt/nesi/CS400_centos7_bdw/GCCcore/12.3.0/bin/gcc
          cxx: /opt/nesi/CS400_centos7_bdw/GCCcore/12.3.0/bin/g++
          fortran: /opt/nesi/CS400_centos7_bdw/GCCcore/12.3.0/bin/gfortran
    - spec: gcc@15.2.0 languages:='c,c++,fortran'
      prefix: /opt/nesi/zen3/GCCcore/15.2.0
      extra_attributes:
        compilers:
          c: /opt/nesi/zen3/GCCcore/15.2.0/bin/gcc
          cxx: /opt/nesi/zen3/GCCcore/15.2.0/bin/g++
          fortran: /opt/nesi/zen3/GCCcore/15.2.0/bin/gfortran
# Other system packages - called externals in Spack
  perl:
    externals:
    - spec: perl@5.32.1~cpanm+opcode+open+shared+threads
      prefix: /usr
  curl:
    externals:
    - spec: curl@7.76.1+gssapi+ldap+nghttp2
      prefix: /usr
  gawk:
    externals:
    - spec: gawk@5.1.0
      prefix: /usr
  groff:
    externals:
    - spec: groff@1.22.4
      prefix: /usr
  gmake:
    externals:
    - spec: gmake@4.3
      prefix: /usr
  swig:
    externals:
    - spec: swig@4.0.2
      prefix: /usr
  pkgconf:
    externals:
    - spec: pkgconf@1.7.3
      prefix: /usr
  diffutils:
    externals:
    - spec: diffutils@3.7
      prefix: /usr
  gettext:
    externals:
    - spec: gettext@0.21
      prefix: /usr
  coreutils:
    externals:
    - spec: coreutils@8.32
      prefix: /usr
  m4:
    externals:
    - spec: m4@1.4.19
      prefix: /usr
  bison:
    externals:
    - spec: bison@3.7.4
      prefix: /usr
  sed:
    externals:
    - spec: sed@4.8
      prefix: /usr
  openssl:
    externals:
    - spec: openssl@3.2.2
      prefix: /usr
  automake:
    externals:
    - spec: automake@1.16.2
      prefix: /usr
  git-lfs:
    externals:
    - spec: git-lfs@3.4.1
      prefix: /usr
  findutils:
    externals:
    - spec: findutils@4.8.0
      prefix: /usr
  flex:
    externals:
    - spec: flex@2.6.4+lex
      prefix: /usr
  tar:
    externals:
    - spec: tar@1.34
      prefix: /usr
  openssh:
    externals:
    - spec: openssh@8.7p1
      prefix: /usr
  zlib:
    externals:
    - spec: zlib@1.2.11
      prefix: /usr
  binutils:
    externals:
    - spec: binutils@2.35.2~gold~headers
      prefix: /usr
    - spec: binutils@2.40 %gcc@12.3.0
      prefix: /opt/nesi/CS400_centos7_bdw/binutils/2.40-GCCcore-12.3.0
    - spec: binutils@2.45 %gcc@15.2.0
      prefix: /opt/nesi/zen3/binutils/2.45-GCCcore-15.2.0
  ucx:
    externals:
    - spec: ucx@1.20.0 %gcc@15.2.0
      prefix: /opt/nesi/zen3/UCX/1.20.0-GCCcore-15.2.0
    - spec: ucx@1.18.1 %gcc@12.3.0
      prefix: /opt/nesi/zen3/UCX/1.18.1-GCCcore-12.3.0
    buildable: false
  ucc:
    externals:
    - spec: ucc@1.7.0 %gcc@15.2.0
      prefix: /opt/nesi/zen3/UCC/1.7.0-GCCcore-15.2.0
    - spec: ucc@1.3.0 %gcc@12.3.0
      prefix: /opt/nesi/zen3/UCC/1.3.0-GCCcore-12.3.0
    buildable: false
  libtool:
    externals:
    - spec: libtool@2.4.6
      prefix: /usr
  subversion:
    externals:
    - spec: subversion@1.14.1
      prefix: /usr
  git:
    externals:
    - spec: git@2.43.5~tcltk
      prefix: /usr
  autoconf:
    externals:
    - spec: autoconf@2.69
      prefix: /usr
