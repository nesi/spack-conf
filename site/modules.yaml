modules:
  # Paths to check when creating modules for all module sets
  prefix_inspections:
    bin:
    - PATH
    man:
    - MANPATH
    share/man:
    - MANPATH
    share/aclocal:
    - ACLOCAL_PATH
    lib/pkgconfig:
    - PKG_CONFIG_PATH
    lib64/pkgconfig:
    - PKG_CONFIG_PATH
    share/pkgconfig:
    - PKG_CONFIG_PATH
    '':
    - CMAKE_PREFIX_PATH

  # These are configurations for the module set named "default"
  default:
    # These values are defaulted in the code. They are not defaulted here so
    # that we can enable backwards compatibility with the old syntax more
    # easily (old value is in the config yaml, config:module_roots)
    # Where to install modules
    roots:
      lmod: /opt/nesi/spack/zen3/modules/lmod
    enable: [lmod]
    lmod:
      hash_length: 0
      exclude_implicits: true
      all:
        autoload: direct
      broot:
        autoload: none
      dust:
        autoload: none
      eza:
        autoload: none
      jnv:
        autoload: none
      lsd:
        autoload: none
      navi:
        autoload: none
      zellij:
        autoload: none
      core_compilers:
      - gcc@11.5.0
      core_specs:
      - gcc
      # Common utilities built with a non-system (aka default/external) compiler. These can co-exist and should not conflict
      - bat
      - broot
      - dust
      - eza
      - fd
      - jnv
      - lsd
      - navi
      - neovim
      - rclone
      - ripgrep
      - tree
      - util-linux
      - zellij
      - zoxide
